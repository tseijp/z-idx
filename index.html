                                <h1>z-idx</h1>
                                <p>z-index DAG builder converting declarative stacking rules into stable numeric layers for shared UI libraries.</p>
                                <h2>Install</h2>
                                <pre><code>npm i z-idx</code></pre>
                                <h2>Usage</h2>
                                <pre><code>import { index } from 'z-idx'

const base = index((z) =&gt; z('overlay', 'modal', 'tooltip'))
// base.overlay = 1024, base.modal = 2048, base.tooltip = 3072

// Extend without breaking existing values
const next = base((z) =&gt; z('modal', 'dialog', 'tooltip'))
// base.overlay === next.overlay (stable)</code></pre>
                                <h2>Features</h2>
                                <p>Declare ordering relationships instead of assigning magic numbers. z-idx uses Kahn's topological sort over a directed acyclic graph to compute stable numeric ranks with consistent spacing. Extensions preserve all previously seeded values while inserting new nodes between existing ones. Full TypeScript type inference surfaces every key as autocomplete in your editor. Zero dependencies.</p>
